<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Lab2 Flask{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="{{ url_for('index') }}">Lab2 Flask</a>
        <div class="collapse navbar-collapse show">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item"><a class="nav-link" href="{{ url_for('request_url') }}">URL параметры</a></li>
                <li class="nav-item"><a class="nav-link" href="{{ url_for('request_headers') }}">Заголовки</a></li>
                <li class="nav-item"><a class="nav-link" href="{{ url_for('request_cookies') }}">Cookie</a></li>
                <li class="nav-item"><a class="nav-link" href="{{ url_for('request_form') }}">Форма</a></li>
                <li class="nav-item"><a class="nav-link" href="{{ url_for('phone') }}">Телефон</a></li>
            </ul>
        </div>
    </div>
</nav>

<main class="py-4">
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</main>

</body>
</html>
