{% extends 'base.html' %}

{% block title %}Проверка телефона{% endblock %}

{% block content %}
<h1 class="mb-3">Проверка номера телефона</h1>
<form method="post" class="card p-3">
    <div class="mb-3">
        <label for="phone" class="form-label">Номер телефона</label>
        <input
            id="phone"
            name="phone"
            type="text"
            value="{{ phone }}"
            class="form-control {% if error %}is-invalid{% endif %}"
            placeholder="+7 (123) 456-75-90"
        >
        {% if error %}
        <div class="invalid-feedback">{{ error }}</div>
        {% endif %}
    </div>
    <button type="submit" class="btn btn-primary">Проверить</button>
</form>

{% if formatted %}
<div class="alert alert-success mt-3 mb-0">
    Преобразованный номер: <strong>{{ formatted }}</strong>
</div>
{% endif %}
{% endblock %}
