{% extends 'base.html' %}

{% block title %}Заголовки{% endblock %}

{% block content %}
<h1 class="mb-3">Заголовки запроса</h1>
<table class="table table-striped table-sm">
    <thead>
    <tr><th>Заголовок</th><th>Значение</th></tr>
    </thead>
    <tbody>
    {% for key, value in headers %}
    <tr><td>{{ key }}</td><td>{{ value }}</td></tr>
    {% endfor %}
    </tbody>
</table>
{% endblock %}
